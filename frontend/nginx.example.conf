# Example: serve a Create React App `build/` output at the site root.
# Set `root` to the folder that contains both `index.html` and the `static/` directory.
#
# If GET /static/js/main.*.js returns HTML (Unexpected token '<'), your server is either:
# - routing missing files to index.html while the .js file was never deployed, or
# - using a catch-all before static files are resolved.

server {
    listen 80;
    server_name _;

    root /var/www/app/build;
    index index.html;

    # Tell search engines not to index any page on this site
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noimageindex" always;

    # Hash-named bundles must be served as files — do not send index.html here
    location ^~ /static/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
